services:
  # PHP-FPM Application Container
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-sig_wisata}_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./storage:/var/www/html/storage
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-sig_wisata}
      - DB_USERNAME=${DB_USERNAME:-sig_wisata_user}
      - DB_PASSWORD=${DB_PASSWORD:-sig_wisata_pass}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sig_wisata_network

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: ${COMPOSE_PROJECT_NAME:-sig_wisata}_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/cloudflare-ips.conf:/etc/nginx/conf.d/cloudflare-ips.conf
    depends_on:
      - app
    networks:
      - sig_wisata_network

  # MySQL Database
  mysql:
    image: mariadb:10.5.8
    container_name: ${COMPOSE_PROJECT_NAME:-sig_wisata}_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-sig_wisata}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_USER: ${DB_USERNAME:-sig_wisata_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-sig_wisata_pass}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - sig_wisata_network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  # Redis Cache & Session Storage
  redis:
    image: redis:alpine
    container_name: ${COMPOSE_PROJECT_NAME:-sig_wisata}_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    networks:
      - sig_wisata_network
    command: redis-server --appendonly yes

  # Node.js for Vite Development Server (HMR)
  node:
    image: node:20-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-sig_wisata}_node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "${VITE_PORT:-5174}:5173"
    networks:
      - sig_wisata_network
    command: sh -c "npm install && npm run dev -- --host"
    stdin_open: true
    tty: true

  # Cloudflare Tunnel
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ${COMPOSE_PROJECT_NAME:-sig_wisata}_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - sig_wisata_network
    depends_on:
      - nginx

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  sig_wisata_network:
    driver: bridge
