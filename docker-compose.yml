services:
  # PHP-FPM Application Container
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sig_wisata_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./storage:/var/www/html/storage
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=sig_wisata
      - DB_USERNAME=sig_wisata_user
      - DB_PASSWORD=sig_wisata_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sig_wisata_network

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: sig_wisata_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - sig_wisata_network

  # MySQL Database
  mysql:
    image: mariadb:10.5.8
    container_name: sig_wisata_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sig_wisata
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: sig_wisata_user
      MYSQL_PASSWORD: sig_wisata_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - sig_wisata_network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  # Redis Cache & Session Storage
  redis:
    image: redis:alpine
    container_name: sig_wisata_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sig_wisata_network
    command: redis-server --appendonly yes

  # Node.js for Vite Development Server (HMR)
  node:
    image: node:20-alpine
    container_name: sig_wisata_node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "5173:5173"
    networks:
      - sig_wisata_network
    command: sh -c "npm install && npm run dev -- --host"
    stdin_open: true
    tty: true

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  sig_wisata_network:
    driver: bridge
